# render.yaml — Render Infrastructure as Code (Blueprint)
# Deploys: FastAPI backend + PostgreSQL database
# Frontend: Deploy manually as a Static Site from the Render dashboard

databases:
  - name: aqi-postgres
    plan: free
    databaseName: aqi_db
    user: aqi_user

services:
  # ── FastAPI Backend ──
  - type: web
    name: aqi-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OWM_API_KEY
        sync: false # You will set this manually in the Render dashboard
      - key: GNEWS_API_KEY
        sync: false # You will set this manually in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: aqi-postgres
          property: connectionString

  # ── India AQI Scheduler (Background Job) ──
  - type: background_job
    name: aqi-scheduler
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python india_scheduler.py
    envVars:
      - key: OWM_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aqi-postgres
          property: connectionString
