# render.yaml — Render Infrastructure as Code (Blueprint)
# This file tells Render how to deploy your entire project.

databases:
  - name: aqi-postgres
    plan: free
    databaseName: aqi_db
    user: aqi_user

services:
  # ── FastAPI Backend ──
  - type: web
    name: aqi-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OWM_API_KEY
        sync: false # You will set this manually in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: aqi-postgres
          property: connectionURI

  # ── React Frontend (Static Site) ──
  - type: web
    name: aqi-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false # Set this to your backend URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
